<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QRIS Dynamic Studio</title>
    <script>
      (() => {
        let savedTheme = "system";

        try {
          savedTheme = localStorage.getItem("qris-dynamic-studio:theme") || "system";
        } catch {
          savedTheme = "system";
        }

        const systemTheme = window.matchMedia("(prefers-color-scheme: dark)").matches
          ? "dark"
          : "light";
        document.documentElement.dataset.theme =
          savedTheme === "system" ? systemTheme : savedTheme;
        document.documentElement.dataset.themeChoice = savedTheme;
      })();
    </script>
    <script type="module" crossorigin src="./assets/index-BX_WgIkm.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-BL-osxEO.css">
  </head>
  <body>
    <main class="app-shell">
      <div class="theme-switcher" id="themeSwitcher">
        <button
          class="theme-toggle"
          id="themeToggle"
          type="button"
          aria-label="Choose theme"
          aria-expanded="false"
          aria-controls="themeMenu"
        >
          <span class="theme-toggle-icon" id="themeToggleIcon" aria-hidden="true"></span>
        </button>
        <div class="theme-menu" id="themeMenu" role="menu" aria-label="Theme options">
          <button class="theme-option" type="button" role="menuitemradio" data-theme-option="system">
            <span class="theme-option-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none">
                <path d="M4 5h16v10H4V5Z" stroke="currentColor" stroke-width="2" />
                <path d="M9 19h6" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                <path d="M12 15v4" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              </svg>
            </span>
            <span>System</span>
          </button>
          <button class="theme-option" type="button" role="menuitemradio" data-theme-option="light">
            <span class="theme-option-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none">
                <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2" />
                <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              </svg>
            </span>
            <span>Light</span>
          </button>
          <button class="theme-option" type="button" role="menuitemradio" data-theme-option="dark">
            <span class="theme-option-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none">
                <path d="M21 14.5A8.5 8.5 0 0 1 9.5 3a7 7 0 1 0 11.5 11.5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
              </svg>
            </span>
            <span>Dark</span>
          </button>
        </div>
      </div>

      <section class="workspace" aria-label="QRIS dynamic generator">
        <div class="panel controls-panel">
          <div class="brand-row">
            <div class="brand-mark">QR</div>
            <div>
              <p class="eyebrow">Dynamic QRIS</p>
              <h1>Payment Poster Studio</h1>
            </div>
          </div>

          <div class="tabs" role="tablist" aria-label="Input source">
            <button class="tab-button active" id="photoTab" type="button">
              Upload Photo
            </button>
            <button class="tab-button" id="textTab" type="button">
              Paste Text
            </button>
          </div>

          <div class="input-mode active" id="photoMode">
            <label class="drop-zone" id="dropZone" for="qrisImage">
              <input id="qrisImage" type="file" accept="image/*" />
              <span class="drop-icon">+</span>
              <span>
                <strong>Upload or drop QRIS photo</strong>
                <small>PNG, JPG, or screenshot</small>
              </span>
            </label>
          </div>

          <div class="input-mode" id="textMode">
            <label class="field">
              <span>QRIS Payload</span>
              <textarea
                id="qrisText"
                rows="7"
                placeholder="Paste static QRIS string here"
              ></textarea>
            </label>
          </div>

          <div class="field-grid">
            <label class="field">
              <span>Merchant Name</span>
              <input id="merchantName" type="text" placeholder="RD STORE.ONLINE" />
              <small id="merchantWarning" class="field-warning" hidden>
                Mengubah Merchant Name hanya mengubah poster, bukan data QRIS pembayaran.
              </small>
            </label>
            <label class="field">
              <span>NMID</span>
              <input id="nmid" type="text" placeholder="ID1021063999994" />
            </label>
            <label class="field">
              <span>Amount</span>
              <input id="amount" type="number" min="1" step="1" value="15000" />
            </label>
          </div>

          <div class="status-bar">
            <span id="statusDot" class="status-dot"></span>
            <span id="statusText">Waiting for QRIS input</span>
          </div>

          <button id="downloadButton" class="primary-button" type="button">
            Download Poster
          </button>
        </div>

        <div class="preview-column">
          <div class="preview-toolbar">
            <div>
              <p class="eyebrow">Live Preview</p>
              <h2>Generated QRIS Poster</h2>
            </div>
            <span id="amountBadge" class="amount-badge">Rp 15.000</span>
          </div>
          <div class="poster-frame">
            <canvas
              id="posterCanvas"
              width="1055"
              height="1491"
              aria-label="Generated QRIS poster preview"
            ></canvas>
          </div>
        </div>
      </section>

      <footer class="app-footer" aria-label="Project links">
        <a
          class="github-link"
          href="https://github.com/Rachmad42/qris-dynamic-studio"
          target="_blank"
          rel="noreferrer"
        >
          <svg
            class="github-logo"
            aria-hidden="true"
            viewBox="0 0 24 24"
            width="18"
            height="18"
            fill="currentColor"
          >
            <path
              d="M12 0.5C5.37 0.5 0 5.87 0 12.5c0 5.28 3.438 9.76 8.205 11.34.6.11.82-.26.82-.58 0-.29-.01-1.04-.02-2.05-3.338.73-4.042-1.61-4.042-1.61-.546-1.39-1.333-1.76-1.333-1.76-1.089-.75.082-.74.082-.74 1.205.09 1.84 1.24 1.84 1.24 1.07 1.83 2.809 1.3 3.495 1 .108-.78.418-1.3.762-1.6-2.665-.3-5.466-1.33-5.466-5.93 0-1.31.469-2.38 1.235-3.22-.124-.3-.535-1.52.117-3.17 0 0 1.008-.32 3.3 1.23.96-.27 1.98-.4 3-.4 1.02 0 2.04.13 3 .4 2.29-1.55 3.3-1.23 3.3-1.23.653 1.65.242 2.87.118 3.17.77.84 1.235 1.91 1.235 3.22 0 4.61-2.805 5.62-5.475 5.92.43.37.815 1.1.815 2.22 0 1.6-.015 2.89-.015 3.28 0 .32.218.7.825.58C20.565 22.26 24 17.78 24 12.5 24 5.87 18.63 0.5 12 0.5z"
            />
          </svg>
          <span>Rachmad42/qris-dynamic-studio</span>
        </a>
      </footer>
    </main>
  </body>
</html>
